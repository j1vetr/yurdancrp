kind = "web"
previewPath = "/"
title = "Yurdan Carpet"
version = "1.0.0"
id = "artifacts/yurdan-carpet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25366

[services.development]
run = "pnpm --filter @workspace/yurdan-carpet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yurdan-carpet", "run", "build" ]
publicDir = "artifacts/yurdan-carpet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25366"
BASE_PATH = "/"
